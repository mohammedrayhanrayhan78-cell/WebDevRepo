<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gemini AI Chatbot</title>

<style>
body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    font-family: Arial;
    color: white;
    text-align: center;
    margin: 0;
    padding: 0;
}

h1 {
    margin-top: 20px;
}

#chatBox {
    width: 400px;
    height: 400px;
    margin: 20px auto;
    padding: 10px;
    border-radius: 12px;
    background: #020617;
    overflow-y: auto;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
    text-align: left;
}

.inputArea {
    display: flex;
    justify-content: center;
    gap: 10px;
}

input {
    width: 300px;
    padding: 10px;
    border-radius: 8px;
    border: none;
}

button {
    padding: 10px 15px;
    border-radius: 8px;
    border: none;
    background: #38bdf8;
    color: black;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>Gemini AI Chatbot</h1>

<div id="chatBox"></div>

<div class="inputArea">
    <input type="text" id="userInput" placeholder="Ask something...">
    <button onclick="sendMessage()">Send</button>
</div>

<script>
const API_KEY = "AIzaSyBAmfHUYzW0qea8EjcrfUXOmAGFmkoxlFM";

async function sendMessage() {
    const input = document.getElementById("userInput");
    const chatBox = document.getElementById("chatBox");

    const userText = input.value;
    if (!userText) return;

    chatBox.innerHTML += `<p><strong>You:</strong> ${userText}</p>`;
    input.value = "";

    try {
        const response = await fetch(
            "https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=" + API_KEY,
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    contents: [
                        {
                            parts: [{ text: userText }]
                        }
                    ]
                })
            }
        );

        const data = await response.json();
        console.log(data);

        const botReply =
            data?.candidates?.[0]?.content?.parts?.[0]?.text ||
            "⚠️ No response";

        chatBox.innerHTML += `<p style="color:lightgreen;"><strong>Bot:</strong> ${botReply}</p>`;
    } catch (error) {
        chatBox.innerHTML += `<p style="color:red;"><strong>Bot:</strong> Error: ${error.message}</p>`;
    }
}
</script>

</body>
</html>
