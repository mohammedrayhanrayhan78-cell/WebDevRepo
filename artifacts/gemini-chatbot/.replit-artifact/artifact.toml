kind = "web"
previewPath = "/"
title = "Gemini AI Chatbot"
version = "1.0.0"
id = "artifacts/gemini-chatbot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20136
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/gemini-chatbot run dev"

[services.env]
PORT = "20136"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/gemini-chatbot", "run", "build"]
publicDir = "artifacts/gemini-chatbot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
